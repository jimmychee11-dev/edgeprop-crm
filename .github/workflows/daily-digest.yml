name: Daily EdgeProp Digest

on:
  workflow_dispatch:        # manual trigger only — daily scraping moved to local Windows Task Scheduler
                            # (EdgeProp blocks GitHub Actions cloud IPs with HTTP 403)

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run daily digest (scrape + email + WhatsApp)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
          GREEN_API_INSTANCE: ${{ secrets.GREEN_API_INSTANCE }}
          GREEN_API_TOKEN: ${{ secrets.GREEN_API_TOKEN }}
          WHATSAPP_TO: ${{ secrets.WHATSAPP_TO }}
        run: npx tsx scripts/daily-digest.ts --max-pages 5

      - name: Commit updated leads
        run: |
          git config user.name "EdgeProp Bot"
          git config user.email "bot@edgeprop-crm"
          git add data/leads.json data/leads.ts data/checkpoint.json
          git diff --staged --quiet || git commit -m "Daily digest $(date +%Y-%m-%d): auto-update leads"
          git push
